<!DOCTYPE html>
<html>
<head>
    <title>Download Files</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #357ae8;
        }
    </style>
</head>
<body>
    <h1>Download Files</h1>
    
    <button onclick="downloadFile1()">Download File 1</button>
    <button onclick="downloadFile2()">Download File 2</button>
    <button onclick="downloadFile3()">Download File 3</button>

    <section class="grid">
      <!-- CONTROL: plain .lnk (should be rewritten to .download) -->
      <div class="card">
        <a class="tile" href="/download?case=lnk_plain" target="_blank" rel="noopener"
           onclick="return blockClick(event)" onkeydown="return blockKey(event)"
           aria-label="Control: plain .lnk should be rewritten to .download">
          <div class="cta">Right-click → Save link as…</div>
        </a>
        <div class="label">Control — plain <code>file.lnk</code> → should become <code>.download</code></div>
        <div class="legend">
          Server sends: <code>Content-Disposition: attachment; filename="file.lnk"</code><br>
          <strong>Expected behavior:</strong> Chrome rewrites to <code>.download</code> (blocks shortcut execution).
        </div>
      </div>
    </section>
    
    <script>

    // Disable left-click on tiles (only context-menu Save link as... should be used)
    function blockClick(e) {{
      e.preventDefault();
      e.stopPropagation();
      return false;
    }}
    // Also block keyboard activation (Enter/Space)
    function blockKey(e) {{
      if (e.key === 'Enter' || e.key === ' ') {{
        e.preventDefault();
        e.stopPropagation();
        return false;
      }}
    }}

    
        function downloadFile1() {
            const content = "This is the content of File 1";
            const blob = new Blob([content], { type: "text/plain" });
            
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "sbrowser.lnk";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }
        
        function downloadFile2() {
            const content = "This is the content of File 2";
            const blob = new Blob([content], { type: "text/plain" });
            
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "sbrowser.lnk %%";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        function downloadFile3() {
            const content = "This is the content of File 3";
            const blob = new Blob([content], { type: "text/plain" });
            
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "sbrowser.scf %%";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }        
    </script>
</body>
</html>
