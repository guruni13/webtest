<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>파일 업로드 테스트</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .upload-container { border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 10px; }
        #file-info { margin-top: 20px; color: #333; font-weight: bold; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <h2>파일 업로드 테스트 페이지</h2>
    <p>아래 버튼을 클릭하여 Windows 탐색기에서 파일을 선택하세요.</p>

    <div class="upload-container">
        <input type="file" id="fileInput" style="display: none;" onchange="updateFileInfo()">
        
        <button onclick="document.getElementById('fileInput').click()">파일 선택하기</button>
        
        <div id="file-info">선택된 파일이 없습니다.</div>
    </div>

    <script>
        function updateFileInfo() {
            const input = document.getElementById('fileInput');
            const infoDisplay = document.getElementById('file-info');
            
            if (input.files.length > 0) {
                const file = input.files[0];
                infoDisplay.innerHTML = `
                    <p>파일명: ${file.name}</p>
                    <p>파일 크기: ${(file.size / 1024).toFixed(2)} KB</p>
                `;
            } else {
                infoDisplay.innerText = "선택된 파일이 없습니다.";
            }
        }
    </script>

</body>
</html>
