<html>
<head>
    <title>Download Example</title>
</head>
<body>
    <h1>File will download automatically</h1>
    
    <script>
        // Create the file content (you can put any content here)
        const content = "This is the content of xxxxx file";
        
        // Create a Blob object
        const blob = new Blob([content], { type: "text/plain" });
        
        // Create a temporary anchor element
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "./aaaaaaaaaabbbbbbbbbbbbbcccccdddddddddddeeeeffddddddddddddddddddddddaaaaaaaaaabbbbbbbbbbbbbcccccdddddddddddeeeeffddddddddddddddddddddddaaaaaaaaaabbbbbbbbbbbbbcccccdddddddddddeeeeffddddddddddddddddddddddaaaaaaaaaabbbbbbbbbbbbbcccccdddddddddddeeeeffddddddddddddddddddddddaaaaaaaaaabbbbbbbbbbbbbcccccdddddddddddeeeeffddddddddddddddddddddddaaaaaaaaaabbbbbbbbbbbbbcccccdddddddddddeeeeffddddddddddddddddddddddaaaaaaaaaabbbbbbbbbbbbbcccccdddddddddddeeeeffddddddddddddddddddddddaaaaaaaaaabbbbbbbbbbbbbcccccdddddddddddeeeeffdddddddddddddddddddddd.png";
        
        // Add to DOM, click it, and remove it
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        // Optional: Clean up the URL object
        setTimeout(() => {
            URL.revokeObjectURL(a.href);
        }, 100);
    </script>
</body>
</html>
